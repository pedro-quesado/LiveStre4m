name: LiveStre4m
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10
  - pip
  - ffmpeg
  - ninja
  - pip:
    - --extra-index-url https://download.pytorch.org/whl/cu121
    # Core PyTorch Stack
    - torch==2.2.1+cu121
    - torchvision==0.17.1+cu121
    - torchaudio==2.2.1+cu121
    - xformers==0.0.25
    
    # Critical version-pinned dependencies
    - numpy==1.26.4
    - opencv-python==4.9.0.80
    - cupy==13.6.0
    
    # 3D / Rendering Packages
    - gsplat==1.5.3
    - git+https://github.com/facebookresearch/pytorch3d.git@c307c64c7000cd370ff379be421bd92f6dec577b
    - trimesh==4.12.2
    - viser==1.0.29
    - nerfview==0.1.3
    
    # Vision / Math / Utilities
    - lpips==0.1.4
    - imageio==2.37.3
    - imageio-ffmpeg==0.6.0
    - PyYAML==6.0.3
    - tqdm==4.67.3
    - matplotlib==3.10.9
    - scipy==1.15.3
    - einops==0.8.2
    - roma==1.5.6
    - decord==0.6.0
    - torchdiffeq==0.2.5